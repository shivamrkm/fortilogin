name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          mkdir -p dist
          go build -o dist/fortilogin-linux-amd64 ./cmd/fortilogin

      - name: Build deb
        run: |
          chmod +x scripts/build-deb.sh
          VERSION="${GITHUB_REF_NAME:-v0.0.0}"
          ./scripts/build-deb.sh "$VERSION"

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/fortilogin-linux-amd64
            dist/deb/*.deb
